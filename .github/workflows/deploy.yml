name: Deploy to VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull akash21070/devsecops-app:latest
            docker stop devsecops-app || true
            docker rm devsecops-app || true
            docker run -d -p 8081:80 --name devsecops-app akash21070/devsecops-app:latest
